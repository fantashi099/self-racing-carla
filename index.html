<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>CARLA Drive</title>
<style>
  html,body{margin:0;padding:0;background:#111;color:#eee;font:14px/1.4 system-ui,sans-serif;overflow:hidden;height:100%}
  #wrap{position:relative;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}
  canvas{max-width:100%;max-height:100%;background:#000;display:block}
  #hud{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.55);padding:6px 10px;border-radius:6px;font-variant-numeric:tabular-nums}
  #hud b{color:#7ec}
  #bar{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:center;gap:10px;padding:8px;background:rgba(0,0,0,.4)}
  #bar button{flex:0 0 auto;padding:10px 14px;border:0;border-radius:6px;background:#333;color:#eee;font:600 14px system-ui;touch-action:none}
  #bar button:active{background:#555}
  .go{background:#2a6!important;color:#fff}
  .brk{background:#c33!important;color:#fff}
  #mapbar{position:absolute;top:8px;right:8px;display:flex;gap:8px;align-items:center;background:rgba(0,0,0,.55);padding:6px 10px;border-radius:6px;font-size:12px}
  #mapbar button{padding:6px 10px;border:0;border-radius:4px;background:#36c;color:#fff;font:600 12px system-ui;cursor:pointer}
  #mapbar button:disabled{opacity:.5;cursor:wait}
  #mapname{color:#7ec;font-weight:600}
  #minimap{position:absolute;bottom:60px;right:8px;width:180px;height:180px;background:rgba(0,0,0,.6);border:1px solid #444;border-radius:6px}
  #help{position:absolute;top:40px;right:8px;background:rgba(0,0,0,.55);padding:6px 10px;border-radius:6px;font-size:12px}
  #err{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.8);text-align:center;padding:20px}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="640" height="360"></canvas>
  <div id="hud">speed <b id="spd">0.0</b> km/h · fps <b id="fps">0</b> · ctrl <b id="ctl">--</b></div>
  <div id="mapbar">
    <span>map: <b id="mapname">--</b></span>
    <button id="randmap" title="Load a random map (F1)">🔄 Random Map</button>
  </div>
  <div id="help">WASD/Arrows · Space brake · R reverse · Enter spawn</div>
  <div id="bar">
    <button data-k="up" class="go">▲ Throttle</button>
    <button data-k="left">◀ Steer L</button>
    <button data-k="right">Steer R ▶</button>
    <button data-k="down" class="brk">▼ Brake</button>
  </div>
  <div id="err"></div>
  <canvas id="minimap" width="180" height="180"></canvas>
</div>
<script>
const $ = s => document.querySelector(s);
const canvas = $('#c'), ctx = canvas.getContext('2d');
const errEl = $('#err'), hudSpd = $('#spd'), hudFps = $('#fps'), hudCtl = $('#ctl');
const mini = $('#minimap'), mctx = mini.getContext('2d');

// Minimap state
let roadSegs = [];
let mapBounds = {min_x: 0, min_y: 0, max_x: 1, max_y: 1};
let carPos = null;  // {x, y, yaw}

// Resolve bridge base: same origin + path prefix by default, override via ?host=
const params = new URLSearchParams(location.search);
// Strip trailing '/drive' (or whatever the serving route is) from pathname to get proxy prefix
const prefix = params.get('host') || (location.origin + location.pathname.replace(/\/(drive|manual)\/?$/, ''));
const API = prefix.replace(/^wss?:/, 'http:').replace(/\/$/, '');
const WS  = prefix.replace(/^https?:/, 'wss:').replace(/^http:/, 'ws:').replace(/\/$/, '');

let vid = null, sensorId = null, ws = null;
const ctrl = {throttle:0, steer:0, brake:0, reverse:false, hand_brake:false};
const keys = new Set();
let lastFrame = performance.now(), fps = 0, fpsCnt = 0, fpsT = performance.now();

function showErr(msg){ errEl.style.display='flex'; errEl.textContent = msg; }
function hideErr(){ errEl.style.display='none'; }

async function spawn(){
  // always spawn fresh — bridge's vehicles dict only tracks what it spawned
  const sv = await fetch(`${API}/spawn/vehicle`,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({})}).then(r=>r.json()).catch(e=>null);
  if (!sv || !sv.id){ showErr('cannot spawn vehicle at '+API); return; }
  vid = sv.id;
  // find or create camera attached to vid
  const sc = await fetch(`${API}/spawn/camera`,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({attach_to:vid,width:640,height:360,fov:90,x:1.5,z:2.5})}).then(r=>r.json());
  sensorId = sc.sensor_id;
  openStream();
  startLoop();
  hideErr();
}

async function loadMapName(){
  try {
    const r = await fetch(`${API}/map/current`).then(r=>r.json());
    if (r && r.map) $('#mapname').textContent = r.map;
  } catch(e){ /* ignore */ }
  loadRoads();
}

async function loadRoads(){
  try {
    const r = await fetch(`${API}/map/roads`).then(r=>r.json());
    if (!r || !r.bounds) return;
    mapBounds = r.bounds;
    roadSegs = r.segments || [];
    drawMinimap();
  } catch(e){ /* ignore */ }
}

function worldToMini(x, y){
  const pad = 6;
  const w = mini.width - pad*2, h = mini.height - pad*2;
  const sx = w / Math.max(1e-6, mapBounds.max_x - mapBounds.min_x);
  const sy = h / Math.max(1e-6, mapBounds.max_y - mapBounds.min_y);
  // CARLA: x = forward, y = right. Map to minimap: x→right, y→down (flip y so north up is -y)
  const mx = pad + (x - mapBounds.min_x) * sx;
  const my = pad + (y - mapBounds.min_y) * sy;
  return [mx, my];
}

function drawMinimap(){
  mctx.clearRect(0,0,mini.width,mini.height);
  if (!roadSegs.length) return;
  mctx.strokeStyle = '#567';
  mctx.lineWidth = 1;
  mctx.beginPath();
  for (const s of roadSegs){
    const [x1, y1] = worldToMini(s[0], s[1]);
    const [x2, y2] = worldToMini(s[2], s[3]);
    mctx.moveTo(x1, y1);
    mctx.lineTo(x2, y2);
  }
  mctx.stroke();
  drawCar();
}

function drawCar(){
  if (!carPos) return;
  const [mx, my] = worldToMini(carPos.x, carPos.y);
  // yaw: 0 = +x (right on minimap). Convert to canvas angle.
  const ang = carPos.yaw * Math.PI / 180;
  mctx.save();
  mctx.translate(mx, my);
  mctx.rotate(ang);
  // arrow body
  mctx.fillStyle = '#7ec';
  mctx.beginPath();
  mctx.moveTo(6, 0);
  mctx.lineTo(-4, -4);
  mctx.lineTo(-4, 4);
  mctx.closePath();
  mctx.fill();
  mctx.restore();
}

async function randomMap(){
  const btn = $('#randmap');
  btn.disabled = true;
  btn.textContent = '🔄 loading…';
  try {
    const r = await fetch(`${API}/map/random`,{method:'POST'}).then(r=>r.json());
    if (r && r.map){
      $('#mapname').textContent = r.map;
      // load_world destroys all actors — drop current vehicle + camera, re-spawn
      vid = null;
      if (ws) { ws.close(); ws = null; }
      if (loopHandle) { clearInterval(loopHandle); loopHandle = null; }
      ctx.clearRect(0,0,canvas.width,canvas.height);
      carPos = null;
      mctx.clearRect(0,0,mini.width,mini.height);
      await loadRoads();
      await spawn();
    } else {
      showErr('random map failed: ' + JSON.stringify(r));
    }
  } catch(e){
    showErr('random map error: ' + e);
  } finally {
    btn.disabled = false;
    btn.textContent = '🔄 Random Map';
  }
}

$('#randmap').addEventListener('click', randomMap);
loadMapName();

function openStream(){
  if (ws) ws.close();
  ws = new WebSocket(`${WS}/stream/${sensorId}`);
  ws.binaryType = 'arraybuffer';
  ws.onmessage = ev => {
    const blob = new Blob([ev.data], {type:'image/jpeg'});
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => { ctx.drawImage(img,0,0,canvas.width,canvas.height); URL.revokeObjectURL(url); fpsTick(); };
    img.src = url;
  };
  ws.onclose = () => { /* fall back to /step polling handled by loop */ };
}

function fpsTick(){
  fpsCnt++;
  const now = performance.now();
  if (now - fpsT >= 1000){ fps = fpsCnt; fpsCnt = 0; fpsT = now; hudFps.textContent = fps; }
}

// keyboard
addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  keys.add(k);
  console.log('keydown', k, 'keys', [...keys]);
  if (k === 'enter' && !vid) spawn();
  if (k === 'r') ctrl.reverse = !ctrl.reverse;
  e.preventDefault();
});
addEventListener('keyup', e => keys.delete(e.key.toLowerCase()));

// touch buttons
document.querySelectorAll('#bar button').forEach(btn => {
  const k = btn.dataset.k;
  const press = e => { keys.add(k); e.preventDefault(); };
  const release = e => { keys.delete(k); e.preventDefault(); };
  btn.addEventListener('pointerdown', press);
  btn.addEventListener('pointerup', release);
  btn.addEventListener('pointerleave', release);
  btn.addEventListener('pointercancel', release);
});

function updateCtrl(){
  let t=0, s=0, b=0;
  if (keys.has('w') || keys.has('arrowup')    || keys.has('up'))    t = 1;
  if (keys.has('s') || keys.has('arrowdown')  || keys.has('down'))  b = 1;
  if (keys.has('a') || keys.has('arrowleft')  || keys.has('left'))  s = -1;
  if (keys.has('d') || keys.has('arrowright') || keys.has('right')) s =  1;
  if (keys.has(' ')) b = 1;
  // smooth steering toward target
  ctrl.throttle = t;
  ctrl.steer    = s;
  ctrl.brake    = b;
  ctrl.hand_brake = keys.has('h');
  hudCtl.textContent = `t${t} s${s} b${b}`;
}

async function stepLoop(){
  if (!vid) return;
  updateCtrl();
  try {
    const r = await fetch(`${API}/step/${vid}`, {
      method:'POST', headers:{'content-type':'application/json'},
      body: JSON.stringify(ctrl)
    });
    if (r.status === 404){
      console.warn('vehicle lost, re-spawning');
      vid = null;
      spawn();
      return;
    }
    if (r.ok){
      const spd = r.headers.get('X-Speed-Kmh');
      if (spd) hudSpd.textContent = spd;
      const px = r.headers.get('X-Pos-X');
      const py = r.headers.get('X-Pos-Y');
      const pyaw = r.headers.get('X-Pos-Yaw');
      if (px && py && pyaw){
        const newPos = {x: parseFloat(px), y: parseFloat(py), yaw: parseFloat(pyaw)};
        const moved = !carPos || Math.hypot(newPos.x - carPos.x, newPos.y - carPos.y) > 0.01;
        carPos = newPos;
        if (moved) drawMinimap();
      }
      const buf = await r.arrayBuffer();
      const blob = new Blob([buf], {type:'image/jpeg'});
      const url = URL.createObjectURL(blob);
      const img = new Image();
      img.onload = () => { ctx.drawImage(img,0,0,canvas.width,canvas.height); URL.revokeObjectURL(url); fpsTick(); };
      img.src = url;
    } else {
      console.warn('step', r.status, await r.text());
    }
  } catch(e){ console.warn('step err', e); }
}

let loopHandle = null;
function startLoop(){
  if (loopHandle) return;
  // ~20Hz control loop; WS frames paint independently
  loopHandle = setInterval(stepLoop, 50);
}

spawn();
</script>
</body>
</html>
